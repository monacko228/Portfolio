<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/portfolio.css">
</head>
<body>
    <div class="wrap">
        <header class="header">
            <a href="./index.html" class="link_back">
                <svg viewBox="0 0 16 16" height="20" width="20" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path
                            d="M5 15H4L0 11L4 7H5V10H11C12.6569 10 14 8.65685 14 7C14 5.34315 12.6569 4 11 4H4V2H11C13.7614 2 16 4.23858 16 7C16 9.76142 13.7614 12 11 12H5V15Z"
                            fill="#ffffff"></path>
                    </g>
                </svg>
                Go back</a>
        </header>
        <div class="main">
            <div class="container">
                <h1 class="header_title">Contact with me</h1>
                <p class="description">
                    Here you can contact with me, send me a message and I will answer you as soon as possible
                </p>
                <form class="form" action="https://formspree.io/f/xqegejwn" method="POST">
                    <label for="email">
                        Your email:
                        <input type="email" name="email" class="input" placeholder="example@gmai.com">
                    </label>
                    <label for="name">
                        Your name:
                        <input type="text" name="name" class="input" placeholder="John Doe" >
                    </label>
                    <label for="mark">
                        Rate my website:
                        <input type="range" name="mark" min="0" max="10" class="input" id="mark_input">
                    </label>
                    <label for="message">
                        Your message:
                        <textarea name="message" class="input" placeholder="example: Hello I want to contact with you"></textarea>
                    </label>
                    <button type="submit" class="btn">Send</button>
                </form>
            </div>
        </div>
        

    </div>
    
</body>
